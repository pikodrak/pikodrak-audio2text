name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.8.1)'
        required: true
        default: 'v0.8.1'
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.tag.outputs.version }}" || true
          git push origin "${{ steps.tag.outputs.version }}" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Audio2Text ${{ steps.tag.outputs.version }}"
          body: |
            ## Audio2Text — Windows & macOS

            | Platform | Download |
            |----------|----------|
            | Windows | `audio2text-windows.exe` — run directly, no install needed |
            | macOS | `audio2text-macos.zip` — unzip, right-click → Open (see Gatekeeper note below) |

            **First launch:** the app downloads the Whisper speech model automatically (~250 MB for *small*, the default).

            ### macOS notes
            - **Gatekeeper:** the app is unsigned. Right-click → Open → Open anyway on first launch.
            - **System audio (loopback):** macOS does not support native loopback. Install [BlackHole](https://github.com/ExistentialAudio/BlackHole) (free), create a Multi-Output Device in Audio MIDI Setup, set it as your output, then use "System audio (loopback)" in the app. Microphone capture works natively.
            - Models and `settings.json` are saved next to `Audio2Text.app` in the folder you unzipped to.

            ### Windows notes
            - System audio (loopback) works natively via WASAPI — no extra drivers needed.
            - Models and `settings.json` are saved next to `audio2text-windows.exe`.

            ### System requirements
            - Windows 10 / 11 (x64)
            - macOS 13+ Ventura (Apple Silicon and Intel)
            - Internet connection on first run

            ### Supported audio formats (file mode)
            MP3, WAV, M4A, OGG, FLAC, AAC, WMA, OPUS
          draft: false
          prerelease: false

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r desktop/requirements.txt

      - name: Build EXE
        working-directory: desktop
        run: pyinstaller audio2text.spec

      - name: Upload Windows EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: desktop/dist/audio2text-windows.exe

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r desktop/requirements.txt

      - name: Build macOS app bundle
        working-directory: desktop
        run: pyinstaller audio2text.spec

      - name: Package .app as zip
        run: cd desktop/dist && zip -r audio2text-macos.zip Audio2Text.app

      - name: Upload macOS zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: desktop/dist/audio2text-macos.zip
